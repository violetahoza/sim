    # Expected: at low loss, delivery ratio stays above 95% — gateway stays in
    # aggregated mode; mode_switches ≈ 0; results should be near-identical to
    # arch_edge_aggregated (no adaptation triggered).
    description: >
      Adaptive Edge (5% Loss) |
      Same adaptive gateway under normal urban RF conditions (5% loss). With the
      delivery ratio typically above 95%, adaptation should rarely trigger —
      validating that the adaptive logic does not interfere under benign conditions.
    protocol: mqtt
