  - name: adaptive_vs_static
    # Expected: multiple mode switches logged during peak-hour bursts (delivery
    # ratio dips below 85%); lower unrecovered loss than loss_15pct with static
    # aggregated; mode_switches > 0.
    description: >
      Adaptive Edge (15% Loss) |
      Edge gateway with adaptive mode enabled under harsh RF conditions. When the
      sensor→edge delivery ratio drops below 85%, the gateway automatically
      switches from aggregated to filtered to limit retransmit amplification.
      Compare against loss_15pct for the static equivalent.
    protocol: mqtt
    architecture: edge_aggregated
    traffic_level: medium
    num_spots: 50
    seed: 42
    loss_rate: 0.15
    sim_duration_s: 86400.0
    use_time_of_day: true
    start_hour: 0.0
    adaptive_edge: true
    group: "I - Adaptive Edge"
    group_order: 1
    is_builtin: true

