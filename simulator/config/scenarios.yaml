scenarios:

  - name: A1_cloud_only
    description: >
      Cloud-Only Baseline | Every sensor event goes straight to the cloud broker via MQTT QoS 0 (fire-and-forget, no retransmits). Maximum cloud bandwidth and lowest
      added latency - the reference ceiling for comparisons.
    protocol: mqtt
    architecture: cloud_only
    traffic_level: peak
    num_spots: 500
    seed: 1001
    mqtt_qos: 0
    sim_duration_s: 10800.0
    use_time_of_day: false
    loss_rate: 0.05
    backhaul_loss_rate: 0.02
    anomaly_detection: false
    group: "A - Architecture Comparison"
    group_order: 1
    is_builtin: true

  - name: A2_edge_filtered
    description: >
      Edge Filtered | Redundant same-state events and heartbeat repeats are suppressed at the gateway; each real state change is forwarded immediately as a singleton.
      No anomaly detection, no quarantine - pure duplicate-window filtering.
    protocol: mqtt
    architecture: edge_filtered
    traffic_level: peak
    num_spots: 500
    seed: 1001
    mqtt_qos: 0
    sim_duration_s: 10800.0
    use_time_of_day: false
    loss_rate: 0.05
    backhaul_loss_rate: 0.02
    anomaly_detection: false
    group: "A - Architecture Comparison"
    group_order: 2
    is_builtin: true

  - name: A3_edge_agg_5s
    description: >
      Edge Aggregated - 5 s window | Events are buffered for up to 5 s and flushed as batches, reducing cloud message count substantially while keeping latency bounded.
    protocol: mqtt
    architecture: edge_aggregated
    traffic_level: peak
    num_spots: 500
    seed: 1001
    mqtt_qos: 0
    aggregation_interval: 5.0
    max_event_age_s: 10.0
    max_batch_size: 500
    sim_duration_s: 10800.0
    use_time_of_day: false
    loss_rate: 0.05
    backhaul_loss_rate: 0.02
    anomaly_detection: false
    group: "A - Architecture Comparison"
    group_order: 3
    is_builtin: true

  - name: A4_edge_agg_15s
    description: >
      Edge Aggregated - 15 s window | Wider window ≈ 3x more events per batch vs A3. Clearer bandwidth saving, larger latency penalty. The headline latency-vs-bandwidth trade-off.
    protocol: mqtt
    architecture: edge_aggregated
    traffic_level: peak
    num_spots: 500
    seed: 1001
    mqtt_qos: 0
    aggregation_interval: 15.0
    max_event_age_s: 30.0
    max_batch_size: 2000
    sim_duration_s: 10800.0
    use_time_of_day: false
    loss_rate: 0.05
    backhaul_loss_rate: 0.02
    anomaly_detection: false
    group: "A - Architecture Comparison"
    group_order: 4
    is_builtin: true

  - name: A5_edge_anomaly
    description: >
      Edge Filtered + Anomaly Detection | Same link/traffic as A2, but all five anomaly rules active (R1 stuck, R2 silent, R3 rapid arrivals, R4 stale sequence, R5 rapid state flip).
      Low quarantine_threshold (2 flags) and shorter silent_threshold (600 s) ensure quarantine visibly fires in the 3-hour window. Quarantined spots have their events 
      suppressed, reducing cloud traffic below A2 while protecting cloud state from noisy sensors.
    protocol: mqtt
    architecture: edge_filtered
    traffic_level: peak
    num_spots: 500
    seed: 1001
    mqtt_qos: 1
    sim_duration_s: 10800.0
    use_time_of_day: false
    loss_rate: 0.05
    backhaul_loss_rate: 0.02
    anomaly_detection: true
    quarantine_threshold: 2
    quarantine_recovery_events: 5
    silent_threshold_s: 600.0
    group: "A - Architecture Comparison"
    group_order: 5
    is_builtin: true

  - name: A6_adaptive_edge
    description: >
      Adaptive Edge | Starts in edge_aggregated (5 s window). The gateway evaluates backhaul delivery in a rolling 30 s window: when it drops below 85%
      it switches to edge_filtered to limit retransmit amplification; it recovers when the window DR climbs back above 95%. High backhaul loss
      (20%) with time-of-day variation guarantees multiple switches per day.
    protocol: mqtt
    architecture: edge_aggregated
    traffic_level: peak
    num_spots: 500
    seed: 1001
    mqtt_qos: 1
    aggregation_interval: 5.0
    max_event_age_s: 10.0
    max_batch_size: 500
    sim_duration_s: 86400.0
    use_time_of_day: true
    start_hour: 6.0
    loss_rate: 0.05
    backhaul_loss_rate: 0.20
    anomaly_detection: false
    adaptive_edge: true
    group: "A - Architecture Comparison"
    group_order: 6
    is_builtin: true


  - name: B1_mqtt_qos0
    description: >
      MQTT QoS 0 - Fire & forget | No ACK, no retransmit. Minimal overhead; lost packets are gone forever. Acceptable only where occasional gaps in occupancy data are tolerable.
    protocol: mqtt
    architecture: edge_filtered
    traffic_level: peak
    num_spots: 500
    seed: 2001
    mqtt_qos: 0
    sim_duration_s: 43200.0
    use_time_of_day: true
    start_hour: 6.0
    loss_rate: 0.05
    backhaul_loss_rate: 0.03
    anomaly_detection: false
    group: "B - Protocol Comparison"
    group_order: 1
    is_builtin: true

  - name: B2_mqtt_qos1
    description: >
      MQTT QoS 1 - At-least-once | One PUBACK round-trip; a lost ACK triggers a retransmit (duplicate suppressed at subscriber). Reliable under moderate loss.
    protocol: mqtt
    architecture: edge_filtered
    traffic_level: peak
    num_spots: 500
    seed: 2001
    mqtt_qos: 1
    sim_duration_s: 43200.0
    use_time_of_day: true
    start_hour: 6.0
    loss_rate: 0.05
    backhaul_loss_rate: 0.03
    anomaly_detection: false
    group: "B - Protocol Comparison"
    group_order: 2
    is_builtin: true

  - name: B3_mqtt_qos2
    description: >
      MQTT QoS 2 - Exactly-once (4-way handshake) | Three ACK legs; highest byte overhead of the MQTT family. ~9% chance of a retransmit per message at 3% backhaul loss.
    protocol: mqtt
    architecture: edge_filtered
    traffic_level: peak
    num_spots: 500
    seed: 2001
    mqtt_qos: 2
    sim_duration_s: 43200.0
    use_time_of_day: true
    start_hour: 6.0
    loss_rate: 0.05
    backhaul_loss_rate: 0.03
    anomaly_detection: false
    group: "B - Protocol Comparison"
    group_order: 3
    is_builtin: true

  - name: B4_coap_non
    description: >
      CoAP Non-Confirmable (NON) | Fire-and-forget UDP - lowest byte overhead of all protocols. Delivery degrades linearly with link loss; no retransmit.
    protocol: coap
    architecture: edge_filtered
    traffic_level: peak
    num_spots: 500
    seed: 2001
    coap_mode: NON
    sim_duration_s: 43200.0
    use_time_of_day: true
    start_hour: 6.0
    loss_rate: 0.05
    backhaul_loss_rate: 0.03
    anomaly_detection: false
    group: "B - Protocol Comparison"
    group_order: 4
    is_builtin: true

  - name: B5_coap_con
    description: >
      CoAP Confirmable (CON) | ACK round-trip per RFC 7252; up to 4 retransmits with exponential backoff. Comparable delivery to MQTT QoS 1 on roughly half the bytes (CBOR encoding).
    protocol: coap
    architecture: edge_filtered
    traffic_level: peak
    num_spots: 500
    seed: 2001
    coap_mode: CON
    sim_duration_s: 43200.0
    use_time_of_day: true
    start_hour: 6.0
    loss_rate: 0.05
    backhaul_loss_rate: 0.03
    anomaly_detection: false
    group: "B - Protocol Comparison"
    group_order: 5
    is_builtin: true

  - name: B6_amqp_auto
    description: >
      AMQP direct exchange - auto ACK, non-durable | Broker ACKs on dispatch; no consumer confirmation. Equivalent to QoS 0 semantics with AMQP's heavier per-frame overhead.
    protocol: amqp
    architecture: edge_filtered
    traffic_level: peak
    num_spots: 500
    seed: 2001
    amqp_exchange: direct
    amqp_ack: auto
    amqp_durable: false
    sim_duration_s: 43200.0
    use_time_of_day: true
    start_hour: 6.0
    loss_rate: 0.05
    backhaul_loss_rate: 0.03
    anomaly_detection: false
    group: "B - Protocol Comparison"
    group_order: 6
    is_builtin: true

  - name: B7_amqp_manual_durable
    description: >
      AMQP direct exchange - manual ACK, durable | Consumer ACK travels back over the lossy backhaul; lost ACKs cause requeue. Equivalent to MQTT QoS 1 with stronger persistence.
      Highest byte overhead overall.
    protocol: amqp
    architecture: edge_filtered
    traffic_level: peak
    num_spots: 500
    seed: 2001
    amqp_exchange: direct
    amqp_ack: manual
    amqp_durable: true
    sim_duration_s: 43200.0
    use_time_of_day: true
    start_hour: 6.0
    loss_rate: 0.05
    backhaul_loss_rate: 0.03
    anomaly_detection: false
    group: "B - Protocol Comparison"
    group_order: 7
    is_builtin: true

  - name: B8_amqp_topic
    description: >
      AMQP topic exchange - manual ACK, durable | Pattern-routed (parking.<edge>.update). Slightly higher broker overhead than B7; useful for per-zone subscriber filtering.
    protocol: amqp
    architecture: edge_filtered
    traffic_level: peak
    num_spots: 500
    seed: 2001
    amqp_exchange: topic
    amqp_ack: manual
    amqp_durable: true
    sim_duration_s: 43200.0
    use_time_of_day: true
    start_hour: 6.0
    loss_rate: 0.05
    backhaul_loss_rate: 0.03
    anomaly_detection: false
    group: "B - Protocol Comparison"
    group_order: 8
    is_builtin: true


  - name: C1_scale_50
    description: >
      Scalability - 50 spots | MQTT QoS1 / edge_filtered baseline at small deployment size. Anchor point for the scalability sweep (C1-C5): same protocol, architecture, and traffic
      mix, only num_spots changes. Use alongside C2-C5 to see how latency, message volume, and bandwidth scale with deployment size.
    protocol: mqtt
    architecture: edge_filtered
    traffic_level: peak
    num_spots: 50
    seed: 3001
    mqtt_qos: 1
    sim_duration_s: 10800.0
    use_time_of_day: false
    loss_rate: 0.05
    backhaul_loss_rate: 0.02
    anomaly_detection: false
    group: "C - Scalability Sweep"
    group_order: 1
    is_builtin: true

  - name: C2_scale_200
    description: >
      Scalability - 200 spots | Same configuration as C1, 4x the deployment size.
    protocol: mqtt
    architecture: edge_filtered
    traffic_level: peak
    num_spots: 200
    seed: 3001
    mqtt_qos: 1
    sim_duration_s: 10800.0
    use_time_of_day: false
    loss_rate: 0.05
    backhaul_loss_rate: 0.02
    anomaly_detection: false
    group: "C - Scalability Sweep"
    group_order: 2
    is_builtin: true

  - name: C3_scale_500
    description: >
      Scalability - 500 spots | Same configuration as C1, matching the reference deployment size used throughout the A/B groups.
    protocol: mqtt
    architecture: edge_filtered
    traffic_level: peak
    num_spots: 500
    seed: 3001
    mqtt_qos: 1
    sim_duration_s: 10800.0
    use_time_of_day: false
    loss_rate: 0.05
    backhaul_loss_rate: 0.02
    anomaly_detection: false
    group: "C - Scalability Sweep"
    group_order: 3
    is_builtin: true

  - name: C4_scale_1000
    description: >
      Scalability - 1000 spots | Same configuration as C1, double the reference deployment.
    protocol: mqtt
    architecture: edge_filtered
    traffic_level: peak
    num_spots: 1000
    seed: 3001
    mqtt_qos: 1
    sim_duration_s: 10800.0
    use_time_of_day: false
    loss_rate: 0.05
    backhaul_loss_rate: 0.02
    anomaly_detection: false
    group: "C - Scalability Sweep"
    group_order: 4
    is_builtin: true

  - name: C5_scale_2000
    description: >
      Scalability - 2000 spots | Same configuration as C1, largest deployment in the sweep (40x C1). Watch for queueing/rate-limit effects as token-bucket and broker throughput
      assumptions are stressed at this size.
    protocol: mqtt
    architecture: edge_filtered
    traffic_level: peak
    num_spots: 2000
    seed: 3001
    mqtt_qos: 1
    sim_duration_s: 10800.0
    use_time_of_day: false
    loss_rate: 0.05
    backhaul_loss_rate: 0.02
    anomaly_detection: false
    group: "C - Scalability Sweep"
    group_order: 5
    is_builtin: true

 
  - name: D1_mqtt_loss_low
    description: >
      Reliability - MQTT QoS1 at 5% backhaul loss | Baseline recovery behavior at modest loss. Part of the D1-D3 MQTT sub-sweep; compare against D4-D6 (CoAP CON) and D7-D9 (AMQP
      manual+durable) at matching loss levels to compare protocol recovery mechanisms head to head.
    protocol: mqtt
    architecture: edge_filtered
    traffic_level: peak
    num_spots: 500
    seed: 4001
    mqtt_qos: 1
    sim_duration_s: 10800.0
    use_time_of_day: false
    loss_rate: 0.05
    backhaul_loss_rate: 0.05
    anomaly_detection: false
    group: "D - Reliability vs Loss Sweep"
    group_order: 1
    is_builtin: true

  - name: D2_mqtt_loss_med
    description: >
      Reliability - MQTT QoS1 at 25% backhaul loss | Same as D1 with backhaul loss raised to 25%; QoS1's bounded retry budget (3 attempts) should start showing real delivery loss.
    protocol: mqtt
    architecture: edge_filtered
    traffic_level: peak
    num_spots: 500
    seed: 4001
    mqtt_qos: 1
    sim_duration_s: 10800.0
    use_time_of_day: false
    loss_rate: 0.05
    backhaul_loss_rate: 0.25
    anomaly_detection: false
    group: "D - Reliability vs Loss Sweep"
    group_order: 2
    is_builtin: true

  - name: D3_mqtt_loss_high
    description: >
      Reliability - MQTT QoS1 at 45% backhaul loss | Severe backhaul degradation; stress test for QoS1 retry exhaustion and worst-case latency tail.
    protocol: mqtt
    architecture: edge_filtered
    traffic_level: peak
    num_spots: 500
    seed: 4001
    mqtt_qos: 1
    sim_duration_s: 10800.0
    use_time_of_day: false
    loss_rate: 0.05
    backhaul_loss_rate: 0.45
    anomaly_detection: false
    group: "D - Reliability vs Loss Sweep"
    group_order: 3
    is_builtin: true

  - name: D4_coap_loss_low
    description: >
      Reliability - CoAP CON at 5% backhaul loss | Confirmable CoAP with exponential backoff, matching D1's loss level for direct protocol comparison.
    protocol: coap
    architecture: edge_filtered
    traffic_level: peak
    num_spots: 500
    seed: 4001
    coap_mode: CON
    sim_duration_s: 10800.0
    use_time_of_day: false
    loss_rate: 0.05
    backhaul_loss_rate: 0.05
    anomaly_detection: false
    group: "D - Reliability vs Loss Sweep"
    group_order: 4
    is_builtin: true

  - name: D5_coap_loss_med
    description: >
      Reliability - CoAP CON at 25% backhaul loss | Matches D2's loss level. CoAP allows up to 4 retransmits with exponential backoff, one more attempt than MQTT QoS1.
    protocol: coap
    architecture: edge_filtered
    traffic_level: peak
    num_spots: 500
    seed: 4001
    coap_mode: CON
    sim_duration_s: 10800.0
    use_time_of_day: false
    loss_rate: 0.05
    backhaul_loss_rate: 0.25
    anomaly_detection: false
    group: "D - Reliability vs Loss Sweep"
    group_order: 5
    is_builtin: true

  - name: D6_coap_loss_high
    description: >
      Reliability - CoAP CON at 45% backhaul loss | Matches D3's loss level; backoff growth (timeout doubling per attempt) should push tail latency higher than MQTT at this loss rate.
    protocol: coap
    architecture: edge_filtered
    traffic_level: peak
    num_spots: 500
    seed: 4001
    coap_mode: CON
    sim_duration_s: 10800.0
    use_time_of_day: false
    loss_rate: 0.05
    backhaul_loss_rate: 0.45
    anomaly_detection: false
    group: "D - Reliability vs Loss Sweep"
    group_order: 6
    is_builtin: true

  - name: D7_amqp_loss_low
    description: >
      Reliability - AMQP manual+durable at 5% backhaul loss | Manual ack with requeue, matching D1/D4's loss level for a three-way protocol comparison.
    protocol: amqp
    architecture: edge_filtered
    traffic_level: peak
    num_spots: 500
    seed: 4001
    amqp_exchange: direct
    amqp_ack: manual
    amqp_durable: true
    sim_duration_s: 10800.0
    use_time_of_day: false
    loss_rate: 0.05
    backhaul_loss_rate: 0.05
    anomaly_detection: false
    group: "D - Reliability vs Loss Sweep"
    group_order: 7
    is_builtin: true

  - name: D8_amqp_loss_med
    description: >
      Reliability - AMQP manual+durable at 25% backhaul loss | Matches D2/D5's loss level. AMQP's requeue has no fixed retry cap (unlike MQTT/CoAP), so delivery ratio 
      should hold up better at the cost of higher latency and byte overhead.
    protocol: amqp
    architecture: edge_filtered
    traffic_level: peak
    num_spots: 500
    seed: 4001
    amqp_exchange: direct
    amqp_ack: manual
    amqp_durable: true
    sim_duration_s: 10800.0
    use_time_of_day: false
    loss_rate: 0.05
    backhaul_loss_rate: 0.25
    anomaly_detection: false
    group: "D - Reliability vs Loss Sweep"
    group_order: 8
    is_builtin: true

  - name: D9_amqp_loss_high
    description: >
      Reliability - AMQP manual+durable at 45% backhaul loss | Matches D3/D6's loss level; the headline scenario for "which protocol degrades most gracefully" under severe loss.
    protocol: amqp
    architecture: edge_filtered
    traffic_level: peak
    num_spots: 500
    seed: 4001
    amqp_exchange: direct
    amqp_ack: manual
    amqp_durable: true
    sim_duration_s: 10800.0
    use_time_of_day: false
    loss_rate: 0.05
    backhaul_loss_rate: 0.45
    anomaly_detection: false
    group: "D - Reliability vs Loss Sweep"
    group_order: 9
    is_builtin: true