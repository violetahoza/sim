scenarios:

  - name: A1_cloud_only
    description: >
      Cloud-Only Baseline | Every sensor event goes straight to the cloud broker via MQTT QoS 0 (fire-and-forget, no retransmits). 
    protocol: mqtt
    architecture: cloud_only
    traffic_level: peak
    num_spots: 500
    seed: 1001
    mqtt_qos: 0
    sim_duration_s: 10800.0
    use_time_of_day: false
    loss_rate: 0.05
    backhaul_loss_rate: 0.02
    anomaly_detection: false
    group: "A - Architecture Comparison"
    group_order: 1
    is_builtin: true

  - name: A2_edge_filtered
    description: >
      Edge Filtered | Redundant same-state events and heartbeat repeats are suppressed at the gateway; each real state change is forwarded immediately as a singleton.
      No anomaly detection, no quarantine - pure duplicate-window filtering.
    protocol: mqtt
    architecture: edge_filtered
    traffic_level: peak
    num_spots: 500
    seed: 1001
    mqtt_qos: 0
    sim_duration_s: 10800.0
    use_time_of_day: false
    loss_rate: 0.05
    backhaul_loss_rate: 0.02
    anomaly_detection: false
    group: "A - Architecture Comparison"
    group_order: 2
    is_builtin: true

  - name: A3_edge_agg_5s
    description: >
      Edge Aggregated - 5 s window | Events are buffered for up to 5 s and flushed as batches, reducing cloud message count substantially while keeping latency bounded.
    protocol: mqtt
    architecture: edge_aggregated
    traffic_level: peak
    num_spots: 500
    seed: 1001
    mqtt_qos: 0
    aggregation_interval: 5.0
    max_event_age_s: 10.0
    max_batch_size: 500
    sim_duration_s: 10800.0
    use_time_of_day: false
    loss_rate: 0.05
    backhaul_loss_rate: 0.02
    anomaly_detection: false
    group: "A - Architecture Comparison"
    group_order: 3
    is_builtin: true

  - name: A4_edge_agg_15s
    description: >
      Edge Aggregated - 15 s window | Wider window ~3x more events per batch vs A3. Clearer bandwidth saving, larger latency penalty. The headline latency-vs-bandwidth trade-off.
    protocol: mqtt
    architecture: edge_aggregated
    traffic_level: peak
    num_spots: 500
    seed: 1001
    mqtt_qos: 0
    aggregation_interval: 15.0
    max_event_age_s: 30.0
    max_batch_size: 2000
    sim_duration_s: 10800.0
    use_time_of_day: false
    loss_rate: 0.05
    backhaul_loss_rate: 0.02
    anomaly_detection: false
    group: "A - Architecture Comparison"
    group_order: 4
    is_builtin: true

  - name: A5_edge_anomaly
    description: >
      Edge Filtered + Anomaly Detection | Same link/traffic as A2, with a statistical anomaly detector.
    protocol: mqtt
    architecture: edge_filtered
    traffic_level: peak
    num_spots: 500
    seed: 1001
    mqtt_qos: 1
    sim_duration_s: 86400.0
    use_time_of_day: true
    start_hour: 6.0
    loss_rate: 0.05
    backhaul_loss_rate: 0.02
    anomaly_detection: true
    quarantine_threshold: 5
    heartbeat_interval_s: 900.0
    silent_threshold_s: 7200.0
    stuck_threshold_s: 50400.0
    faults:
      - type: silent
        count: 6
      - type: stuck_at
        count: 6
        stuck_state: occupied
      - type: flapping
        count: 6
      - type: replay
        count: 6
        replay_count: 3
      - type: flooding
        count: 6
        flood_count: 10
    group: "A - Architecture Comparison"
    group_order: 5
    is_builtin: true

  - name: A6_adaptive_edge
    description: >
      Adaptive Edge | Starts in edge_aggregated (5 s window). The gateway evaluates backhaul delivery in a rolling 30 s window: when it drops below 85%
      it switches to edge_filtered to limit retransmit amplification; it recovers when the window DR climbs back above 95%. 
    protocol: mqtt
    architecture: edge_aggregated
    traffic_level: peak
    num_spots: 500
    seed: 1001
    mqtt_qos: 1
    aggregation_interval: 5.0
    max_event_age_s: 10.0
    max_batch_size: 500
    sim_duration_s: 86400.0
    use_time_of_day: true
    start_hour: 6.0
    loss_rate: 0.05
    backhaul_loss_rate: 0.02
    backhaul_loss_peak_rate: 0.25
    adaptive_min_window_samples: 8
    adaptive_degrade_threshold: 0.90
    adaptive_filtered_threshold: 0.80
    adaptive_recover_threshold: 0.92
    anomaly_detection: false
    adaptive_edge: true
    group: "A - Architecture Comparison"
    group_order: 6
    is_builtin: true


  - name: B1_mqtt_qos0
    description: >
      MQTT QoS 0 - Fire & forget | No ACK, no retransmit. Minimal overhead; lost packets are gone forever. Acceptable only where occasional gaps in occupancy data are tolerable.
    protocol: mqtt
    architecture: edge_filtered
    traffic_level: peak
    num_spots: 500
    seed: 2001
    mqtt_qos: 0
    sim_duration_s: 43200.0
    use_time_of_day: true
    start_hour: 6.0
    loss_rate: 0.05
    backhaul_loss_rate: 0.03
    anomaly_detection: false
    group: "B - Protocol Comparison"
    group_order: 1
    is_builtin: true

  - name: B2_mqtt_qos1
    description: >
      MQTT QoS 1 - At-least-once | One PUBACK round-trip; a lost PUBACK triggers a PUBLISH retransmit, so the broker re-delivers the message (a duplicate). The cloud
      deduplicates by (spot, sequence) so state is still applied once. Reliable under moderate loss, at the cost of occasional duplicate deliveries.
    protocol: mqtt
    architecture: edge_filtered
    traffic_level: peak
    num_spots: 500
    seed: 2001
    mqtt_qos: 1
    sim_duration_s: 43200.0
    use_time_of_day: true
    start_hour: 6.0
    loss_rate: 0.05
    backhaul_loss_rate: 0.03
    anomaly_detection: false
    group: "B - Protocol Comparison"
    group_order: 2
    is_builtin: true

  - name: B3_mqtt_qos2
    description: >
      MQTT QoS 2 - Exactly-once (4-way handshake) | Three ACK legs; highest byte overhead of the MQTT family. 
    protocol: mqtt
    architecture: edge_filtered
    traffic_level: peak
    num_spots: 500
    seed: 2001
    mqtt_qos: 2
    sim_duration_s: 43200.0
    use_time_of_day: true
    start_hour: 6.0
    loss_rate: 0.05
    backhaul_loss_rate: 0.03
    anomaly_detection: false
    group: "B - Protocol Comparison"
    group_order: 3
    is_builtin: true

  - name: B4_coap_non
    description: >
      CoAP Non-Confirmable (NON) | Fire-and-forget UDP - lowest byte overhead of all protocols. Delivery degrades linearly with link loss; no retransmit.
    protocol: coap
    architecture: edge_filtered
    traffic_level: peak
    num_spots: 500
    seed: 2001
    coap_mode: NON
    sim_duration_s: 43200.0
    use_time_of_day: true
    start_hour: 6.0
    loss_rate: 0.05
    backhaul_loss_rate: 0.03
    anomaly_detection: false
    group: "B - Protocol Comparison"
    group_order: 4
    is_builtin: true

  - name: B5_coap_con
    description: >
      CoAP Confirmable (CON) | ACK round-trip per RFC 7252; up to 4 retransmits with exponential backoff. 
    protocol: coap
    architecture: edge_filtered
    traffic_level: peak
    num_spots: 500
    seed: 2001
    coap_mode: CON
    sim_duration_s: 43200.0
    use_time_of_day: true
    start_hour: 6.0
    loss_rate: 0.05
    backhaul_loss_rate: 0.03
    anomaly_detection: false
    group: "B - Protocol Comparison"
    group_order: 5
    is_builtin: true

  - name: B6_amqp_auto
    description: >
      AMQP direct exchange - auto ACK, non-durable | Broker ACKs on dispatch; no consumer confirmation. Equivalent to QoS 0 semantics with AMQP's heavier per-frame overhead.
    protocol: amqp
    architecture: edge_filtered
    traffic_level: peak
    num_spots: 500
    seed: 2001
    amqp_exchange: direct
    amqp_ack: auto
    amqp_durable: false
    sim_duration_s: 43200.0
    use_time_of_day: true
    start_hour: 6.0
    loss_rate: 0.05
    backhaul_loss_rate: 0.03
    anomaly_detection: false
    group: "B - Protocol Comparison"
    group_order: 6
    is_builtin: true

  - name: B7_amqp_manual_durable
    description: >
      AMQP direct exchange - manual ACK, durable | Consumer ACK travels back over the lossy backhaul; lost ACKs cause requeue. Equivalent to MQTT QoS 1 with stronger persistence.
    protocol: amqp
    architecture: edge_filtered
    traffic_level: peak
    num_spots: 500
    seed: 2001
    amqp_exchange: direct
    amqp_ack: manual
    amqp_durable: true
    sim_duration_s: 43200.0
    use_time_of_day: true
    start_hour: 6.0
    loss_rate: 0.05
    backhaul_loss_rate: 0.03
    anomaly_detection: false
    group: "B - Protocol Comparison"
    group_order: 7
    is_builtin: true

  - name: B8_amqp_topic
    description: >
      AMQP topic exchange - manual ACK, durable | Pattern-routed (parking.<edge>.update). Slightly higher broker overhead than B7; useful for per-zone subscriber filtering.
    protocol: amqp
    architecture: edge_filtered
    traffic_level: peak
    num_spots: 500
    seed: 2001
    amqp_exchange: topic
    amqp_ack: manual
    amqp_durable: true
    sim_duration_s: 43200.0
    use_time_of_day: true
    start_hour: 6.0
    loss_rate: 0.05
    backhaul_loss_rate: 0.03
    anomaly_detection: false
    group: "B - Protocol Comparison"
    group_order: 8
    is_builtin: true


