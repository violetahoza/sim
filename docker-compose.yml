services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: parking-mosquitto
    ports:
      - "127.0.0.1:1883:1883"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "healthcheck/ping", "-m", "ok", "-i", "hc"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 3s

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: parking-rabbitmq
    ports:
      - "127.0.0.1:5672:5672"   # AMQP wire protocol
      - "127.0.0.1:15672:15672" # management UI (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s