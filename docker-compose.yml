services:

  mqtt:
    image: eclipse-mosquitto:2.0
    container_name: parking-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883" # MQTT
      - "9001:9001" # WebSocket (optional, for browser clients)
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "health", "-m", "ping", "-q", "0"]
      interval: 10s
      timeout: 5s
      retries: 3

  amqp:
    image: rabbitmq:3.13-management-alpine
    container_name: parking-amqp
    restart: unless-stopped
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # Management UI  →  http://localhost:15672  (parking/parking)
    environment:
      RABBITMQ_DEFAULT_USER: parking
      RABBITMQ_DEFAULT_PASS: parking
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  mosquitto_data:
  mosquitto_log:
  rabbitmq_data: